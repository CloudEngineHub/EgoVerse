defaults:
  - hpt_cotrain_enc_dec_base

robomimic_model:
  diffusion: true 
  head_specs:
    shared: null
    aria_bimanual: 
      _target_: egomimic.models.mean_flow_policy.MeanFlowPolicy
      action_horizon: 100
      num_inference_steps: 1
      pooling: null
      time_dist: "lognorm"
      adaptive_loss: true
      infer_ac_dims:
        aria_bimanual: 12
      model:
        _target_: egomimic.models.denoising_nets.CrossTransformer
        nblocks: 6
        cond_dim: 256
        hidden_dim: 128
        act_dim: 12
        act_seq: 100
        n_heads: 4
        dropout: 0.1
        mlp_layers: 4 
        mlp_ratio: 4
        mean_flow: true

    eve_bimanual: 
      _target_: egomimic.models.mean_flow_policy.MeanFlowPolicy
      action_horizon: 100
      num_inference_steps: 1
      pooling: null
      time_dist: "lognorm"
      adaptive_loss: true
      infer_ac_dims:
        eve_bimanual: 14
      model:
        _target_: egomimic.models.denoising_nets.CrossTransformer
        nblocks: 6
        cond_dim: 256
        hidden_dim: 128
        act_dim: 14
        act_seq: 100
        n_heads: 4
        dropout: 0.1
        mlp_layers: 4 
        mlp_ratio: 4
        mean_flow: true

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 3e-4
  weight_decay: 0.0001

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  T_max: 1400
  eta_min: 1e-5