_target_: egomimic.pl_utils.pl_data_utils.MultiDataModuleWrapper

train_datasets:
  scale_bimanual:
    _target_: egomimic.rldb.zarr.zarr_dataset_multi.MultiDataset._from_resolver
    resolver:
      _target_: egomimic.rldb.zarr.zarr_dataset_multi.S3EpisodeResolver
      folder_path: /storage/project/r-dxu345-0/shared/egoverseS3PiHuman
      key_map:
        _target_: egomimic.rldb.embodiment.human.Scale.get_keymap
      transform_list:
        _target_: egomimic.rldb.embodiment.human.Scale.get_transform_list
    filters:
      lab: "scale"
      task: "freeform_fold_clothes"
    mode: total
valid_datasets:
  scale_bimanual:
    _target_: egomimic.rldb.zarr.zarr_dataset_multi.MultiDataset._from_resolver
    resolver:
      _target_: egomimic.rldb.zarr.zarr_dataset_multi.S3EpisodeResolver
      folder_path: /storage/project/r-dxu345-0/shared/egoverseS3PiHuman
      key_map:
        _target_: egomimic.rldb.embodiment.human.Scale.get_keymap
      transform_list:
        _target_: egomimic.rldb.embodiment.human.Scale.get_transform_list
    filters:
      lab: "scale"
      task: "freeform_fold_clothes"
    mode: total
train_dataloader_params:
  scale_bimanual:
    # batch_size: 64
    batch_size: 2
    num_workers: 10
valid_dataloader_params:
  scale_bimanual:
    # batch_size: 64
    batch_size: 2
    num_workers: 10
